name: Build and Publish Arch Repository

on:
  schedule:
    - cron: '0 19 * * *'
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'packages.txt'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-repo
  cancel-in-progress: true

env:
  RELEASE_TAG: repository
  REPO_DB_NAME: nanoka

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Scan directories and generate matrix
        id: set-matrix
        run: |
          set -euo pipefail
          pkgs=()
          for dir in */ ; do
            dir="${dir%/}"
            case "$dir" in
              .github|cache|output) continue ;;
            esac
            if [[ -f "$dir/PKGBUILD" ]]; then
              pkgs+=("$dir")
            fi
          done

          MATRIX_JSON=$(printf '%s\n' "${pkgs[@]}" | jq -R . | jq -s -c .)
          echo "Found packages: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Install base dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed git subversion mercurial sudo rsync github-cli fakeroot binutils pacman-contrib paru curl awk tar jq
          id builder >/dev/null 2>&1 || useradd -m builder
          grep -q '^builder ALL=(ALL) NOPASSWD: ALL$' /etc/sudoers || echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Configure makepkg for x86-64-v3 optimization
        run: |
          set -euo pipefail
          echo "Downloading CachyOS v3 makepkg.conf..."
          curl -sLo /etc/makepkg.conf https://raw.githubusercontent.com/CachyOS/docker-makepkg/refs/heads/master/docker-makepkg-v3/makepkg.conf
          echo "Downloading CachyOS v3 rust.conf..."
          mkdir -p /etc/makepkg.conf.d
          curl -sLo /etc/makepkg.conf.d/rust.conf https://raw.githubusercontent.com/CachyOS/docker-makepkg/refs/heads/master/docker-makepkg-v3/rust.conf
          sed -i 's/^PKGDEST=/#PKGDEST=/g' /etc/makepkg.conf
          sed -i 's/^LOGDEST=/#LOGDEST=/g' /etc/makepkg.conf
          sed -i 's/^PACKAGECARCH=/#PACKAGECARCH=/g' /etc/makepkg.conf

      - name: Configure pacman options and custom repository
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          awk '
            BEGIN { inserted=0 }
            /^\[options\]$/ && !inserted { print; print "DisableSandboxNetwork"; inserted=1; next }
            { print }
            END { if (!inserted) exit 1 }
          ' /etc/pacman.conf > "$tmp"
          cat "$tmp" > /etc/pacman.conf
          rm -f "$tmp"

          cat <<EOF >> /etc/pacman.conf

          [nanoka]
          SigLevel = Optional TrustAll
          Server = https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG
          EOF
          pacman -Sy

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Fix workspace ownership for build user
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build, Cache and Fallback Logic
        env:
          GH_TOKEN: ${{ github.token }}
          PKG: ${{ matrix.package }}
        run: |
          set -uo pipefail
          mkdir -p output /tmp/repo-files /tmp/repo-db

          echo "Fetching database metadata..."
          if gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir /tmp/repo-db --pattern "${REPO_DB_NAME}.files.tar.gz" 2>/dev/null; then
             tar -xzf "/tmp/repo-db/${REPO_DB_NAME}.files.tar.gz" -C /tmp/repo-files 2>/dev/null || true
          fi

          echo "Checking status for $PKG"
          if grep -q 'pkgver()' "$PKG/PKGBUILD"; then
            sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE/$PKG' && makepkg -od --noprepare --skipinteg" >/dev/null 2>&1 || true
          fi

          EXPECTED_PKGS=$(sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE/$PKG' && makepkg --packagelist 2>/dev/null" || true)
          EXPECTED_PKGS="${EXPECTED_PKGS//:/.}"

          NEEDS_BUILD=false
          if [[ -z "$EXPECTED_PKGS" ]]; then
             NEEDS_BUILD=true
          else
             for pkg_path in $EXPECTED_PKGS; do
               pkg_basename=$(basename "$pkg_path")
               if ! grep -q -x "$pkg_basename" /tmp/repo-files/*/desc 2>/dev/null; then
                 NEEDS_BUILD=true
                 break
               fi
             done
          fi

          if [[ "$NEEDS_BUILD" == "false" ]]; then
             echo "Package $PKG is up to date. Fetching specific cache from release."
             for pkg_path in $EXPECTED_PKGS; do
               pkg_basename=$(basename "$pkg_path")
               if ! gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir output --pattern "$pkg_basename" 2>/dev/null; then
                  echo "Failed to fetch $pkg_basename cache. Forcing rebuild."
                  NEEDS_BUILD=true
                  break
               fi
             done
          fi

          if [[ "$NEEDS_BUILD" == "false" ]]; then
             echo "$PKG" > output/status-skipped-$PKG.txt
          else
             echo "Building $PKG with paru"
             sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE/$PKG' && paru --noconfirm --skipreview --useask --removemake --nocheck -B '$GITHUB_WORKSPACE/$PKG'" || true
             
             if ls "$PKG"/*.pkg.tar.zst >/dev/null 2>&1; then
               mv "$PKG"/*.pkg.tar.zst output/
               echo "Build OK: $PKG"
               echo "$PKG" > output/status-built-$PKG.txt
             else
               echo "Build failed for $PKG"

               echo "Triggering fallback mechanism for $PKG..."
               FALLBACK_SUCCESS=false

               if [[ -d /tmp/repo-files ]]; then
                 for desc_file in /tmp/repo-files/*/desc; do
                   [[ -f "$desc_file" ]] || continue
                   base_pkg=$(awk '/^%BASE%/{getline; print; exit}' "$desc_file")
                   pkg_name=$(awk '/^%NAME%/{getline; print; exit}' "$desc_file")
                   check_name="${base_pkg:-$pkg_name}"

                   if [[ "$check_name" == "$PKG" ]]; then
                     file_name=$(awk '/^%FILENAME%/{getline; print; exit}' "$desc_file")
                     if [[ -n "$file_name" ]]; then
                       echo "Restoring $file_name from previous release"
                       if gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir output --pattern "$file_name" 2>/dev/null; then
                          FALLBACK_SUCCESS=true
                          echo "$PKG" > output/status-failed-$PKG.txt
                       fi
                     fi
                   fi
                 done
               fi

               if [[ "$FALLBACK_SUCCESS" == "false" ]]; then
                 echo "Fallback failed for $PKG: no previous files found. Gracefully exiting to ignore package."
                 exit 0
               fi
             fi
          fi

          sudo -u builder rm -rf "$GITHUB_WORKSPACE/$PKG/src" "$GITHUB_WORKSPACE/$PKG/pkg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.package }}
          path: output/*
          if-no-files-found: ignore
          retention-days: 1

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm --needed github-cli pacman-contrib jq

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: output
          pattern: pkg-*
          merge-multiple: true

      - name: Generate fresh pacman database & Prepare Release Notes
        id: generate
        run: |
          set -euo pipefail
          cd output
          shopt -s nullglob
          pkgs=( *.pkg.tar.zst )

          if (( ${#pkgs[@]} == 0 )); then
            echo "No packages exist. Repository is empty. Halting."
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_packages=true" >> "$GITHUB_OUTPUT"

          BUILT=$(cat status-built-*.txt 2>/dev/null || true)
          SKIPPED=$(cat status-skipped-*.txt 2>/dev/null || true)
          FAILED=$(cat status-failed-*.txt 2>/dev/null || true)
          rm -f status-*.txt

          if [[ -z "$BUILT" ]]; then
            echo "has_new_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_changes=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Generating clean database from active packages only."
          repo-add "${REPO_DB_NAME}.db.tar.gz" "${pkgs[@]}"

          FORMATTED_BUILT=$(echo "$BUILT" | sed '/^$/d' | sed 's/^/- 🟢 /')
          FORMATTED_SKIPPED=$(echo "$SKIPPED" | sed '/^$/d' | sed 's/^/- 🟡 /')
          FORMATTED_FAILED=$(echo "$FAILED" | sed '/^$/d' | sed 's/^/- 🔴 /' | sed 's/$/ (Restored via Fallback)/')

          [[ -z "$FORMATTED_BUILT" ]] && FORMATTED_BUILT="- None"
          [[ -z "$FORMATTED_SKIPPED" ]] && FORMATTED_SKIPPED="- None"
          [[ -z "$FORMATTED_FAILED" ]] && FORMATTED_FAILED="- None"

          {
            echo "BUILT_LOG<<EOF"
            echo "$FORMATTED_BUILT"
            echo "EOF"
            echo "SKIPPED_LOG<<EOF"
            echo "$FORMATTED_SKIPPED"
            echo "EOF"
            echo "FAILED_LOG<<EOF"
            echo "$FORMATTED_FAILED"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Publish to GitHub Release
        if: steps.generate.outputs.has_packages == 'true' && steps.generate.outputs.has_new_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ env.RELEASE_TAG }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Cleaning up all old assets to remove deleted packages."
            gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' \
              | while read -r name; do
                  [[ -n "$name" ]] || continue
                  gh release delete-asset "$TAG" "$name" --repo "$REPO" -y || true
                done
          else
            echo "Creating release $TAG."
            gh release create "$TAG" --repo "$REPO" \
              --title "Arch Package Repository" \
              --notes "Auto-built pacman repository."
          fi

          echo "Uploading current assets."
          gh release upload "$TAG" output/* --repo "$REPO" --clobber

          RELEASE_NOTES=$(cat <<EOF
          ### 📦 Repository Update Summary (Matrix Build)

          **Last Updated:** $(date -u '+%Y-%m-%d %H:%M UTC')

          #### 🟢 Newly Built Packages
          ${{ env.BUILT_LOG }}

          #### 🟡 Cached / Skipped Packages
          ${{ env.SKIPPED_LOG }}

          #### 🔴 Failed Packages
          ${{ env.FAILED_LOG }}

          ---
          *Automated Scatter-Gather build by GitHub Actions.*
          EOF
          )

          gh release edit "$TAG" --repo "$REPO" --notes "$RELEASE_NOTES"
